<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Click to Component</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      padding: 14px;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #111827;
      background: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
      letter-spacing: -0.01em;
    }

    .github-link {
      color: #6b7280;
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .github-link:hover { color: #111827; }

    .field {
      margin-bottom: 12px;
    }

    .meta {
      font-size: 11px;
      color: #6b7280;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      color: #111827;
      background: #fff;
      appearance: auto;
    }

    select { cursor: pointer; }

    input[type="text"] {
      font-family: ui-monospace, monospace;
      font-size: 11px;
    }

    input[type="text"]::placeholder { color: #6b7280; }

    select:focus, input[type="text"]:focus {
      outline: 2px solid #111827;
      outline-offset: 1px;
    }

    .saved {
      font-size: 10px;
      color: #111827;
      margin-top: 4px;
      min-height: 14px;
    }

    .hint {
      margin-top: 10px;
      padding-top: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .hint-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .hint-row + .hint-row {
      border-top: 1px solid #f3f4f6;
      padding-top: 6px;
    }

    kbd {
      display: inline-block;
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-bottom-width: 2px;
      border-radius: 3px;
      padding: 1px 5px;
      font: 10px ui-monospace, monospace;
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Click to Component</h1>
    <a class="github-link" href="https://github.com/sambernhardt/click-to-component-chrome-extension" target="_blank" rel="noopener" title="View on GitHub">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
          -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
          .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
          -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
          .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
          .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
          0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </div>

  <div class="field">
    <label for="editor" class="meta">Editor</label>
    <select id="editor">
      <option value="cursor" selected>Cursor</option>
      <option value="vscode">VS Code</option>
      <option value="zed">Zed</option>
      <option value="webstorm">WebStorm</option>
    </select>
  </div>

  <!-- Project Root: only needed for webpack-based setups (older Next.js, CRA) where
       source maps use relative webpack:// paths. Turbopack embeds absolute paths so
       this field is unnecessary for the primary use case.
  <div class="field">
    <label for="projectRoot">Project Root</label>
    <input type="text" id="projectRoot" placeholder="/Users/you/Dev/my-project" spellcheck="false" />
    <div class="saved" id="savedMsg"></div>
  </div>
  -->

  <div class="hint meta">
    <div class="hint-row">
      <span>Toggle overlay</span>
      <span><kbd>Alt</kbd> <kbd>Shift</kbd> <kbd>C</kbd></span>
    </div>
    <div class="hint-row">
      <span>Close / deactivate</span>
      <kbd>Esc</kbd>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
